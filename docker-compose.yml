version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: tracex_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-1210}
      POSTGRES_DB: ${POSTGRES_DB:-tracex}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-tracex}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tracex_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=jdbc:postgresql://db:5432/${POSTGRES_DB:-tracex}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-1210}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-9a3c9e6db5817a1e0df1c5d0a6c0e86b240ffbe3750b284ea6be284ad0c7c88b}
      - OLLAMA_URL=http://host.docker.internal:11434/api/generate
      - OLLAMA_MODEL=qwen3:8b
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  pgdata:

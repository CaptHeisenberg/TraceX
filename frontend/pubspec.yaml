name: frontend
description: TraceX PCB AOI Manufacturing Intelligence Platform.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.2.1

  # Networking & Storage
  dio: ^5.5.0
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3
  supabase_flutter: ^2.8.0

  # Charts
  fl_chart: ^0.68.0

  # Hardware QR Code Scanner
  mobile_scanner: ^5.1.1

  # UI Enhancement & Icons
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  flutter_spinkit: ^5.2.1

  # Model Generation
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # PDF Report Generation & Utilities
  pdf: ^3.10.8
  path_provider: ^2.1.3
  open_file: ^3.3.2
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

  # Code Generators
  build_runner: ^2.4.11
  freezed: ^2.5.1
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
